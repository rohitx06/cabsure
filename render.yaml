# Render Blueprint — deploy everything with one click
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cabsure
    runtime: node
    region: oregon
    plan: free
    nodeVersion: "20.18.0"
    buildCommand: "npm install && npm run build && cd server && npm install --production"
    startCommand: "cd server && node index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cabsure-db
          property: connectionString

databases:
  - name: cabsure-db
    plan: free
    region: oregon
