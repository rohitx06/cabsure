# Render Blueprint — deploy backend API
# https://render.com/docs/blueprint-spec
# Frontend is deployed separately at https://cabsure.onrender.com

services:
  - type: web
    name: cabsure-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: "npm install"
    startCommand: "node index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # set manually in Render dashboard (Neon connection string)
      - key: ALLOWED_ORIGINS
        value: https://cabsure.onrender.com
